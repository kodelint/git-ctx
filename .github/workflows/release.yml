name: Release

on:
  push:
    branches:
      - main
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  # This job runs on push to main to detect if a new release is needed based on semantic commits.
  bump-version:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.check-version.outputs.new_tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}

      - name: Install git-cliff
        uses: kenji-miyake/setup-git-cliff@v2

      - name: Determine next version
        id: check-version
        run: |
          CURRENT_VERSION=$(grep '^version =' Cargo.toml | cut -d '"' -f 2)
          # git-cliff --bump calculates the next version based on conventional commits
          NEXT_VERSION=$(git-cliff --bumped-version)
          # Ensure NEXT_VERSION starts with 'v' for the tag comparison
          if [[ ! $NEXT_VERSION =~ ^v ]]; then
            NEXT_VERSION="v$NEXT_VERSION"
          fi

          echo "Current version: $CURRENT_VERSION"
          echo "Next version: $NEXT_VERSION"

          if [ "v$CURRENT_VERSION" != "$NEXT_VERSION" ]; then
            echo "Version bump needed: $CURRENT_VERSION -> $NEXT_VERSION"
            echo "new_tag=$NEXT_VERSION" >> $GITHUB_OUTPUT

            # Update Cargo.toml
            sed -i "s/^version = \"$CURRENT_VERSION\"/version = \"${NEXT_VERSION#v}\"/" Cargo.toml
            # Update src/main.rs
            sed -i "s/version = \"$CURRENT_VERSION\"/version = \"${NEXT_VERSION#v}\"/" src/main.rs

            # Configure git
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"

            # Commit and tag
            git add Cargo.toml src/main.rs
            git commit -m "chore(release): prepare for $NEXT_VERSION"
            git tag -a "$NEXT_VERSION" -m "Release $NEXT_VERSION"
            git push origin main --tags
          else
            echo "No version bump needed."
            echo "new_tag=" >> $GITHUB_OUTPUT
          fi

  test:
    name: Test
    needs: bump-version
    # Runs ONLY if a new tag was pushed, OR if we manually push a tag starting with v
    if: always() && (needs.bump-version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - name: Run tests
        run: cargo test

  build:
    name: Build
    needs: [bump-version, test]
    if: always() && (needs.bump-version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: macos-latest
    strategy:
      matrix:
        target:
          - x86_64-apple-darwin
          - aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        run: |
          cd target/${{ matrix.target }}/release
          tar czf ../../../git-ctx-${{ matrix.target }}.tar.gz git-ctx
      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: git-ctx-${{ matrix.target }}
          path: git-ctx-${{ matrix.target }}.tar.gz

  release:
    name: Release
    needs: [bump-version, build]
    if: always() && (needs.bump-version.outputs.new_tag != '' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.TOKEN }}
      - name: Download Artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate Changelog
        uses: orhun/git-cliff-action@v4
        with:
          config: cliff.toml
          args: --latest
        env:
          OUTPUT: CHANGELOG.md
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump-version.outputs.new_tag || github.ref_name }}
          body_path: CHANGELOG.md
          files: artifacts/**/*
          token: ${{ secrets.TOKEN }}

